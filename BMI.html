<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="index.css">
    
</head>

<body>
    <main>
        <section class="bmi-card">
            <div class="bmi-header">
                <h1>BMI Calculator</h1>
                <p>Enter your weight and height to check your body mass index.</p>
            </div>

            <div class="input-area">
                <label>
                    Weight
                    <input type="number" name="" id="inputElement1" placeholder="Enter weight">
                </label>

                <label>
                    Height
                    <input type="number" name="" id="inputElement2" placeholder="Enter height">
                </label>

                <button onclick="bmiCheck()">Check BMI</button>
            </div>

            <p id="bmiScore"></p>
        </section>
    </main>

</body>

</html>

<script src="index.js">
    

</script>
